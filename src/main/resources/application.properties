spring.application.name=library

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3309}/${DB_NAME:library_db}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=${DB_USER:library_user}
spring.datasource.password=${DB_PASSWORD:library_password}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
jwt.secret=${JWT_SECRET}
google.books.api-key=${GOOGLE_BOOKS_API_KEY}

# JWT expiration time in ms (43200000 = 12 hours)
jwt.expiration=43200000